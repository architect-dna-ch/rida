name: iOS Release

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  screenshots:
    runs-on: macos-26
    timeout-minutes: 40
    strategy:
      matrix:
        include:
          - device: "iPhone 16 Plus"
            os: "26.5"
            slug: "iphone-69"
          - device: "iPhone 16"
            os: "26.5"
            slug: "iphone-61"
          - device: "iPad Pro 13-inch (M4)"
            os: "26.5"
            slug: "ipad-13"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export for Capacitor
        run: |
          mv app/api _api_routes_tmp
          BUILD_TARGET=capacitor NEXT_PUBLIC_API_BASE=https://rida.architect-dna.ch npx next build
          mv _api_routes_tmp app/api

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Add UITest target
        run: |
          gem install xcodeproj --no-document 2>/dev/null || true
          ruby ios/add_uitest_target.rb

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Capture screenshots
        run: |
          mkdir -p $RUNNER_TEMP/screenshots/${{ matrix.slug }}
          xcodebuild test \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination "platform=iOS Simulator,name=${{ matrix.device }},OS=${{ matrix.os }}" \
            -only-testing:AppUITests/ScreenshotTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            SIMULATOR_SCREENSHOTS_DIR=$RUNNER_TEMP/screenshots/${{ matrix.slug }}

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ matrix.slug }}
          path: ${{ runner.temp }}/screenshots/${{ matrix.slug }}/
          retention-days: 30

  build:
    runs-on: macos-26
    timeout-minutes: 60
    needs: screenshots

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build static export for Capacitor
        run: |
          mv app/api _api_routes_tmp
          BUILD_TARGET=capacitor NEXT_PUBLIC_API_BASE=https://rida.architect-dna.ch npx next build
          mv _api_routes_tmp app/api

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Install signing assets
        env:
          DIST_P12_BASE64: ${{ secrets.DIST_P12_BASE64 }}
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          security create-keychain -p cmpass build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p cmpass build.keychain
          security set-keychain-settings -t 7200 -u build.keychain

          echo "$DIST_P12_BASE64" | base64 --decode > /tmp/dist.p12
          security import /tmp/dist.p12 -k build.keychain -P cmpass -T /usr/bin/codesign -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k cmpass build.keychain

          PP_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PP_DIR"
          echo "$PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PP_DIR/08345fea-1edf-42fa-8aad-91138c84c895.mobileprovision"

      - name: Resolve Swift packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Build IPA
        env:
          TEAM_ID: V28MG47TZC
        run: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="Rida AppStore Distribution" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            DEVELOPMENT_TEAM=$TEAM_ID

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/build/

      - name: Upload to TestFlight
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_PRIVATE_KEY: ${{ secrets.ASC_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_PRIVATE_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          IPA=$(find $RUNNER_TEMP/build -name "*.ipa" | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER_ID \
            --show-progress

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Rida-IPA
          path: ${{ runner.temp }}/build/*.ipa
          retention-days: 7
