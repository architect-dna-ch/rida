workflows:
  ios-release:
    name: Rida iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 22.11.0
      xcode: latest
      vars:
        BUNDLE_ID: ch.architectdna.rida
        TEAM_ID: V28MG47TZC
        APP_STORE_APPLE_ID: "6772517201"
      groups:
        - apple_credentials
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ch.architectdna.rida

    scripts:
      - name: Install dependencies
        script: npm ci

      - name: Build static export for Capacitor
        script: |
          mv app/api _api_routes_tmp
          NEXT_PUBLIC_API_BASE=https://rida.architect-dna.ch npx next build
          mv _api_routes_tmp app/api

      - name: Sync Capacitor
        script: npx cap sync ios

      - name: Resolve Swift packages
        script: |
          xcodebuild -resolvePackageDependencies \
            -project ios/App/App.xcodeproj \
            -scheme App

      - name: Increment build number
        script: |
          BUILD=$(date +%Y%m%d%H%M)
          agvtool new-version -all $BUILD
        working_directory: ios/App

      - name: Build IPA
        script: |
          xcodebuild \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -configuration Release \
            -archivePath build/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$TEAM_ID

          xcodebuild \
            -exportArchive \
            -archivePath build/App.xcarchive \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath build/

      - name: Upload to TestFlight
        script: |
          IPA=$(find build -name "*.ipa" | head -1)
          xcrun altool --upload-app -f "$IPA" -t ios \
            --apiKey $ASC_KEY_ID \
            --apiIssuer $ASC_ISSUER_ID \
            --private-key @/tmp/asc.p8 \
            --show-progress

    artifacts:
      - build/*.ipa

    publishing:
      app_store_connect:
        api_key: $ASC_PRIVATE_KEY
        key_id: $ASC_KEY_ID
        issuer_id: $ASC_ISSUER_ID
        submit_to_testflight: true
      email:
        recipients:
          - besonnet.kl2@gmail.com
